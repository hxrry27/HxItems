# HxItems Configuration

# Database settings
database:
  type: sqlite  # Using SQLite for safety over stupid json
  file: items.db

# Item name settings
rename:
  max-length: 64
  allow-formatting: true
  allow-unicode: true
  strip-italic: true  # Automatically remove italic formatting

# Lore settings
lore:
  max-lines: 20
  max-line-length: 100
  allow-formatting: true
  allow-unicode: true
  strip-italic: true  # Automatically remove italic formatting

# Signature settings
signatures:
  enabled: true
  max-message-length: 100
  show-timestamp: true
  format: "<gray>Signed by <white>{player}<gray>: <italic>{message}"

# Formatting
formatting:
  # Default format applied to all text
  default-prefix: "<!italic>"  # Remove italic by default
  
  # Color support
  legacy-colors: true      # Allow & color codes
  minimessage: true        # Allow MiniMessage format
  hex-colors: true         # Allow &#RRGGBB hex colors
  
  # Unicode support (requires resource pack)
  unicode:
    enabled: true
    # Whitelist unicode ranges (resource pack dependent)
    allowed-ranges:
      - "\uE000-\uF8FF"  # Private use area (custom symbols)

# Model path
# - relative paths resolve from this plugin's data folder (plugins/HxItems/)
# - absolute paths are used as-is
model:
  local-path: "../../../resourcepack"

# Messages
messages:
  prefix: "<dark_gray>[<aqua>HxItems<dark_gray>] "
  
  rename:
    success: "<green>Renamed item to: {name}"
    cleared: "<green>Item name cleared"
    too-long: "<red>Name too long! Max {max} characters"
    no-item: "<red>You must be holding an item!"
  
  lore:
    set: "<green>Set line {line} to: {text}"
    added: "<green>Added line {line}: {text}"
    removed: "<green>Removed line {line}"
    cleared: "<green>Cleared all lore"
    invalid-line: "<red>Invalid line number! Must be 1-{max}"
    too-long: "<red>Lore line too long! Max {max} characters"
    too-many-lines: "<red>Too many lore lines! Max {max} lines"
    no-item: "<red>You must be holding an item!"
  
  sign:
    success-blank: "<green>You signed an item!"
    success-with-message: "<green>You signed with the message: {message}"
    cleared: "<green>Signature removed"
    already-signed: "<red>This item is already signed!"
    message-too-long: "<red>Message too long! Max {max} characters"
    no-item: "<red>You must be holding an item!"
    not-signed: "<red>This item is not signed!"

  tag:
    added: "&aAdded tag &e{tag}&a to item."
    removed: "&aRemoved tag &e{tag}&a from item."
    not-found: "&cNo tag named &e{tag}&c exists. See &e/tag list&c."
    not-on-item: "&cItem doesn't have the &e{tag}&c tag."
    already-present: "&eItem already has the &6{tag}&e tag."
    cleared: "&aCleared all tags from item."
    no-item: "&cYou must be holding an item!"
    reloaded: "&aTag registry reloaded: &e{count}&a tags loaded, &e{touched}&a items updated."

  model:
    # Generic
    not-a-player: "<red>Only players can use /model."
    no-permission: "<red>You don't have permission: <white><perm></white>"
    no-item: "<red>Hold an item to modify."
    no-item-inspect: "<red>Hold an item to inspect."

    # /model set
    set-usage: "<red>Usage: /model set <tag>"
    set-success: "<green>Set model data: <white><tag>"
    set-unknown-tag: "<yellow>Warning: tag <white><tag></white> not found in resource pack. Applying anyway."
    set-item-mismatch: "<yellow>Note: tag <white><tag></white> was defined for <white><expected></white>, not <white><actual></white>."

    # /model clear
    clear-success: "<green>Cleared model data."
    clear-none: "<yellow>Item has no custom model data."

    # /model info
    info-none: "<gray>No custom model data on held item."
    info-display: |
      <gold>Custom Model Data:</gold>
        <gray>strings:</gray> <white><strings></white>
        <gray>floats:</gray>  <white><floats></white>
        <gray>flags:</gray>   <white><flags></white>
        <gray>colors:</gray>  <white><colors></white>

    # /model reload
    reload-success: "<green>Rescanned pack: <white><count></white> tags loaded."

    # Usage
    usage: |
      <gold>Usage:</gold>
        <yellow>/model set <tag></yellow>  <gray>- apply model to held item</gray>
        <yellow>/model clear</yellow>      <gray>- remove model from held item</gray>
        <yellow>/model info</yellow>       <gray>- inspect held item</gray>
        <yellow>/model reload</yellow>     <gray>- rescan resource pack</gray>
  
  admin:
    reload: "<green>Configuration reloaded!"
    info: "<gray>HxItems v{version} <dark_gray>| <gray>Signatures: {count}"
  
  error:
    no-permission: "<red>You don't have permission to do that!"
    invalid-usage: "<red>Usage: {usage}"