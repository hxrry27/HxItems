# HxItems Configuration

# Database settings
database:
  type: sqlite  # Using SQLite for safety over stupid json
  file: items.db

# Item name settings
rename:
  max-length: 64
  allow-formatting: true
  allow-unicode: true
  strip-italic: true  # Automatically remove italic formatting

# Lore settings
lore:
  max-lines: 20
  max-line-length: 100
  allow-formatting: true
  allow-unicode: true
  strip-italic: true  # Automatically remove italic formatting

# Signature settings
signatures:
  enabled: true
  max-message-length: 100
  show-timestamp: true
  format: "&7Signed by &f{player}&7: &o{message}"

# Formatting
formatting:
  # Default format applied to all text
  default-prefix: "<!italic>"  # Remove italic by default
  
  # Color support
  legacy-colors: true      # Allow & color codes
  minimessage: true        # Allow MiniMessage format
  hex-colors: true         # Allow &#RRGGBB hex colors
  
  # Unicode support (requires resource pack)
  unicode:
    enabled: true
    # Whitelist unicode ranges (resource pack dependent)
    allowed-ranges:
      - "\uE000-\uF8FF"  # Private use area (custom symbols)

# Messages
messages:
  prefix: "&8[&bHxItems&8] "
  
  rename:
    success: "&aRenamed item to: {name}"
    cleared: "&aItem name cleared"
    too-long: "&cName too long! Max {max} characters"
    no-item: "&cYou must be holding an item!"
  
  lore:
    set: "&aSet line {line} to: {text}"
    added: "&aAdded line {line}: {text}"
    removed: "&aRemoved line {line}"
    cleared: "&aCleared all lore"
    invalid-line: "&cInvalid line number! Must be 1-{max}"
    too-long: "&cLore line too long! Max {max} characters"
    too-many-lines: "&cToo many lore lines! Max {max} lines"
    no-item: "&cYou must be holding an item!"
  
  sign:
    success: "&aSigned item: {message}"
    cleared: "&aSignature removed"
    already-signed: "&cThis item is already signed!"
    message-too-long: "&cMessage too long! Max {max} characters"
    no-item: "&cYou must be holding an item!"
    not-signed: "&cThis item is not signed!"
  
  admin:
    reload: "&aConfiguration reloaded!"
    info: "&7HxItems v{version} &8| &7Signatures: {count}"
  
  error:
    no-permission: "&cYou don't have permission to do that!"
    invalid-usage: "&cUsage: {usage}"