# HxItems Configuration

# Database settings
database:
  type: sqlite  # Using SQLite for safety over stupid json
  file: items.db

# Item name settings
rename:
  max-length: 64
  allow-formatting: true
  allow-unicode: true
  strip-italic: true  # Automatically remove italic formatting

# Lore settings
lore:
  max-lines: 20
  max-line-length: 100
  allow-formatting: true
  allow-unicode: true
  strip-italic: true  # Automatically remove italic formatting

# Signature settings
signatures:
  enabled: true
  max-message-length: 100
  show-timestamp: true
  format: "<gray>Signed by <white>{player}<gray>: <italic>{message}"

# Formatting
formatting:
  # Default format applied to all text
  default-prefix: "<!italic>"  # Remove italic by default
  
  # Color support
  legacy-colors: true      # Allow & color codes
  minimessage: true        # Allow MiniMessage format
  hex-colors: true         # Allow &#RRGGBB hex colors
  
  # Unicode support (requires resource pack)
  unicode:
    enabled: true
    # Whitelist unicode ranges (resource pack dependent)
    allowed-ranges:
      - "\uE000-\uF8FF"  # Private use area (custom symbols)

# Messages
messages:
  prefix: "<dark_gray>[<aqua>HxItems<dark_gray>] "
  
  rename:
    success: "<green>Renamed item to: {name}"
    cleared: "<green>Item name cleared"
    too-long: "<red>Name too long! Max {max} characters"
    no-item: "<red>You must be holding an item!"
  
  lore:
    set: "<green>Set line {line} to: {text}"
    added: "<green>Added line {line}: {text}"
    removed: "<green>Removed line {line}"
    cleared: "<green>Cleared all lore"
    invalid-line: "<red>Invalid line number! Must be 1-{max}"
    too-long: "<red>Lore line too long! Max {max} characters"
    too-many-lines: "<red>Too many lore lines! Max {max} lines"
    no-item: "<red>You must be holding an item!"
  
  sign:
    success-blank: "<green>You signed an item!"
    success-with-message: "<green>You signed with the message: {message}"
    cleared: "<green>Signature removed"
    already-signed: "<red>This item is already signed!"
    message-too-long: "<red>Message too long! Max {max} characters"
    no-item: "<red>You must be holding an item!"
    not-signed: "<red>This item is not signed!"
  
  admin:
    reload: "<green>Configuration reloaded!"
    info: "<gray>HxItems v{version} <dark_gray>| <gray>Signatures: {count}"
  
  error:
    no-permission: "<red>You don't have permission to do that!"
    invalid-usage: "<red>Usage: {usage}"